[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "D",   # pydocstyle
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "INT", # flake8-gettext
    "N",   # pep8-naming
    "PGH", # pygrep-hooks
    "PIE", # flake8-pie
    "PYI", # flake8-pyi
    "RET", # flake8-return
    "RSE", # flake8-raise
    "RUF", # Ruff-specific rules
    "SIM", # flake8-simplify
    "T20", # flake8-print
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
]

ignore = [
    "D100", # Missing docstring in public module
    "D101", # Missing docstring in public class
    "D102", # Missing docstring in public method
    "D103", # Missing docstring in public function
    "D104", # Missing docstring in public package
    "D203", # 1 blank line required before class docstring
    "D213", # Multi-line docstring summary should start at the second line
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["E501", "D101", "D102", "D103"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["custom_components.quilt_hp"]
combine-as-imports = true

[tool.mypy]
python_version = "3.13"
show_error_codes = true
ignore_missing_imports = true
strict = true
warn_unreachable = true
disallow_untyped_defs = true
check_untyped_defs = true
disable_error_code = ["attr-defined", "unused-ignore"]

[[tool.mypy.overrides]]
module = [
    "homeassistant.*",
    "voluptuous.*",
    "quilt_hp.*",
]
ignore_missing_imports = true

[tool.basedpyright]
include = ["custom_components/quilt_hp"]
pythonVersion = "3.13"
typeCheckingMode = "all" # Ultra-strict mode

# Loosen some checks that are too noisy in HA environment
reportMissingTypeStubs = false
reportUnknownMemberType = false
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownLambdaType = false
reportAny = false
reportExplicitAny = false
reportUnusedCallResult = false
reportIncompatibleVariableOverride = false
reportIncompatibleUnannotatedOverride = false
reportImplicitOverride = false
reportPrivateImportUsage = false
reportTypedDictNotRequiredAccess = false

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = [".git", "testing_config"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

